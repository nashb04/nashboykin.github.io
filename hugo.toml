baseURL = 'https://nashb04.github.io/nashboykin.github.io/'
locale = 'en-us'
title = 'Stars on Earth'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pygmentsUseClasses = true

[minify]
  disableXML = true

[params]
  env = 'production'
  title = 'Stars on Earth'
  description = 'Stars on Earth — Nash Boykin on remarkable people, good reads, and fusion energy'
  keywords = ['blog', 'stars on earth', 'nash boykin', 'fusion', 'duke', 'fuqua']
  author = 'Nash Boykin'
  DateFormat = 'January 2, 2006'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowShareButtons = false
  ShowReadingTime = true
  displayFullLangName = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  comments = false
  hidemeta = false

  [params.homeInfoParams]
    Title = 'Stars on Earth'
    Content = "Field notes on the remarkable people I meet and the best things I read, with a recurring soft spot for fusion energy. [More about me&nbsp;→](about/)"

  [[params.socialIcons]]
    name = 'linkedin'
    title = 'LinkedIn'
    url = 'https://www.linkedin.com/in/cnb45/'

  [[params.socialIcons]]
    name = 'email'
    title = 'Email me'
    url = 'mailto:cnb45@duke.edu'

  [[params.socialIcons]]
    name = 'cv'
    title = 'Resume'
    url = 'cnb_resume.pdf'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[[menu.main]]
  identifier = 'posts'
  name = 'Posts'
  url = '/posts/'
  weight = 10

[[menu.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 20

[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 30

[taxonomies]
  tag = 'tags'
  category = 'categories'

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  style = 'monokai'
